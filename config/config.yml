models:
  - type: main
    engine: nim
    model: meta/llama-3.1-70b-instruct
    api_key_env_var: NVIDIA_API_KEY

instructions:
  - type: general
    content: |
      You are a helpful AI assistant for answering medical questions.

      Rules:
      - Only answer medical and health-related questions.
      - If the user asks something unrelated to healthcare, politely refuse.
      - Never provide dangerous or illegal advice.
      - If uncertain, say so.